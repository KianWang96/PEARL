experiment_name: cifar10_dpsgd_full_ring150
output_dir: results/cifar10/decentralized_references/dpsgd_full/ring_alpha03

seeds: [1, 2, 3]
methods: [dpsgd_full_neighbors]

seed: 1
dataset: cifar10
data_dir: data
download: true
num_clients: 50
partition: dirichlet
dirichlet_alpha: 0.3
classes_per_client: 2
min_client_size: 10
train_subset: null
test_subset: null
graph_type: ring
er_prob: 0.15

rounds: 150
local_epochs: 1
batch_size: 64
lr: 1.0e-3
num_workers: 2
pin_memory: true
device: auto
latent_dim: 128
model_width: 32
lambda_rec: 1.0
lambda_cls: 1.0
mixing_alpha: 0.3
exchange_mode: full_model
selection_method: dpsgd_full_neighbors
anchor_size: 64
hard_class_threshold: 0.5
explore_window: 10
active_probability: 1.0
descriptor_refresh_period: 1
eval_every: 5
plot_format: pdf
